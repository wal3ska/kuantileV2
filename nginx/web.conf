# React SPA'yi sunan ic nginx (web container'i icinde calisir).
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;

    # DIKKAT: burada "types {}" blogu KULLANMA — varsayilan mime tablosunu
    # tamamen ezer ve HTML dahil her sey octet-stream olur.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
