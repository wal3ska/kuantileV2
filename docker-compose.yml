services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kuantile
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kuantile
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 200m

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://kuantile:${DB_PASSWORD}@db:5432/kuantile
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      APP_BASE_URL: https://api.kuantile.com
    depends_on:
      - db
    mem_limit: 350m

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    expose:
      - "80"
    mem_limit: 100m

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  pgdata:
  certbot-www:
  certbot-conf:
